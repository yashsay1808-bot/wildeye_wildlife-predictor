<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wildlife Conflict Predictor — Bandipur &amp; Nagarahole</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #10160F;
    --panel: #171F15;
    --panel-2: #1D2619;
    --line: #2C3928;
    --text-primary: #EDEFE8;
    --text-muted: #8FA083;
    --forest: #2F6B3C;
    --farmland: #D9A441;
    --risk-high: #E24B3C;
    --risk-elevated: #E8A23A;
    --risk-safe: #4E9E5B;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg-deep); color:var(--text-primary); font-family:'Inter',sans-serif; height:100vh; overflow:hidden; }
  .mono { font-family:'JetBrains Mono', monospace; }
  .display { font-family:'Spectral', serif; }

  .topbar {
    height: 60px; background: var(--panel); border-bottom: 1px solid var(--line);
    display:flex; align-items:center; padding:0 20px; gap:20px; z-index:20; position:relative;
  }
  .brand { font-family:'Spectral',serif; font-weight:600; font-size:17px; display:flex; align-items:center; gap:8px; }
  .brand .leaf { color: var(--forest); font-size: 18px; }

  .phase-toggle { display:flex; gap:0; margin-left:8px; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .phase-toggle button {
    background:var(--panel-2); color:var(--text-muted); border:none; padding:8px 14px; font-size:12px;
    font-family:'Inter',sans-serif; cursor:pointer; transition:all .15s ease;
  }
  .phase-toggle button.active { background:var(--forest); color:#fff; }

  .telemetry { display:flex; gap:22px; margin-left:auto; font-size:12px; color:var(--text-muted); }
  .telemetry .item { display:flex; flex-direction:column; gap:2px; }
  .telemetry .label { text-transform:uppercase; letter-spacing:.08em; font-size:10px; }
  .telemetry .value { color:var(--text-primary); font-size:13px; }

  .main { display:flex; height:calc(100vh - 60px); }
  #map { flex:1; background:var(--bg-deep); }

  .feed { width:340px; background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column; z-index:15; }
  .feed-header { padding:16px 18px 12px; border-bottom:1px solid var(--line); }
  .feed-header h2 { margin:0; font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); font-weight:600; }
  .feed-list { flex:1; overflow-y:auto; padding:8px 12px; }
  .feed-list::-webkit-scrollbar { width:6px; }
  .feed-list::-webkit-scrollbar-thumb { background:var(--line); border-radius:3px; }

  .card { background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:8px; animation:slide-in .3s ease; }
  @keyframes slide-in { from{opacity:0; transform:translateX(12px);} to{opacity:1; transform:translateX(0);} }
  .card .row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .pill { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; padding:3px 8px; border-radius:999px; }
  .pill.high { background:rgba(226,75,60,.18); color:var(--risk-high); }
  .pill.elevated { background:rgba(232,162,58,.18); color:var(--risk-elevated); }
  .pill.fire { background:rgba(232,162,58,.18); color:var(--farmland); }
  .card .meta { font-size:11px; color:var(--text-muted); margin-top:4px; }
  .empty-state { color:var(--text-muted); font-size:12px; text-align:center; padding:40px 20px; line-height:1.6; }

  .legend {
    position:absolute; bottom:20px; left:20px; z-index:10; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; padding:10px 14px; font-size:11px; color:var(--text-muted);
  }
  .legend .row { display:flex; align-items:center; gap:8px; margin:3px 0; }
  .legend .swatch { width:10px; height:10px; border-radius:3px; }

  .animal-marker { width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; border:2px solid #fff2; }
  .animal-marker.safe { background: var(--risk-safe); }
  .animal-marker.elevated { background: var(--risk-elevated); }
  .animal-marker.high { background: var(--risk-high); box-shadow:0 0 0 4px rgba(226,75,60,.25); }

  .village-marker { width:10px; height:10px; border-radius:2px; background:var(--panel-2); border:1.5px solid var(--farmland); transform:rotate(45deg); }

  .leaflet-popup-content-wrapper { background:var(--panel-2); color:var(--text-primary); border:1px solid var(--line); }
  .leaflet-popup-tip { background:var(--panel-2); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="leaf">🌿</span> Wildlife Conflict Predictor</div>
  <div class="phase-toggle">
    <button id="phase1-btn" class="active">Phase 1 · Zones</button>
    <button id="phase2-btn">Phase 2 · Satellite</button>
  </div>
  <div class="telemetry">
    <div class="item"><span class="label">Tracked</span><span class="value mono" id="tel-tracked">—</span></div>
    <div class="item"><span class="label">Active Risk</span><span class="value mono" id="tel-conflicts">—</span></div>
    <div class="item"><span class="label">Fire Signals</span><span class="value mono" id="tel-fires">—</span></div>
  </div>
</div>

<div class="main">
  <div id="map"></div>
  <div class="feed">
    <div class="feed-header"><h2>Conflict &amp; Risk Feed</h2></div>
    <div class="feed-list" id="feed-list">
      <div class="empty-state">No active risk signals.<br/>Watching reserve boundaries…</div>
    </div>
  </div>
</div>

<div class="legend" id="legend"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  const map = L.map('map', { zoomControl: true }).setView([11.85, 76.35], 9);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18,
  }).addTo(map);

  let currentPhase = 1;
  let satelliteLayers = {};
  let bufferLayers = [];
  const animalMarkers = new Map();
  const seenConflictIds = new Set();
  const seenFireKeys = new Set();

  function riskColor(risk) {
    if (risk === 'high') return getComputedStyle(document.documentElement).getPropertyValue('--risk-high');
    if (risk === 'elevated') return getComputedStyle(document.documentElement).getPropertyValue('--risk-elevated');
    return getComputedStyle(document.documentElement).getPropertyValue('--risk-safe');
  }

  function setLegendPhase1() {
    document.getElementById('legend').innerHTML = `
      <div class="row"><span class="swatch" style="background:var(--forest)"></span> Reserve core</div>
      <div class="row"><span class="swatch" style="background:var(--risk-elevated)"></span> Approaching buffer</div>
      <div class="row"><span class="swatch" style="background:var(--risk-high)"></span> Farmland risk zone</div>
      <div class="row"><span class="swatch" style="background:var(--farmland)"></span> Village</div>
    `;
  }

  function setLegendPhase2(legendData) {
    const rows = (legendData || []).map(l => `<div class="row"><span class="swatch" style="background:${l.color}"></span> ${l.label}</div>`).join('');
    document.getElementById('legend').innerHTML = rows || '<div class="row">Loading satellite classification…</div>';
  }

  // ---- Phase 1: reserve polygons + buffer rings ----
  async function loadReserves() {
    const res = await fetch('/api/reserves');
    const data = await res.json();

    data.reserves.forEach((r) => {
      const latlngs = r.polygon.map(([lon, lat]) => [lat, lon]);
      const poly = L.polygon(latlngs, { color: '#2F6B3C', weight: 2, fillColor: '#2F6B3C', fillOpacity: 0.25 });
      const buffer = L.polygon(latlngs, { color: '#E8A23A', weight: 1, dashArray: '4,4', fillOpacity: 0 });
      // Approximate the buffer zone by drawing the polygon outline slightly thicker;
      // real geodesic buffering happens server-side for actual risk calculations.
      poly.bindPopup(`<b>${r.name}</b>`);
      bufferLayers.push(poly, buffer);
      if (currentPhase === 1) { poly.addTo(map); buffer.addTo(map); }
    });
  }

  // ---- Phase 2: real GEE tile layer ----
  async function loadSatelliteLayer(reserveKey) {
    if (satelliteLayers[reserveKey]) return satelliteLayers[reserveKey].addTo(map);
    try {
      const res = await fetch(`/api/land-classification/${reserveKey}`);
      if (!res.ok) {
        const err = await res.json();
        setLegendPhase2([{ label: err.error || 'Satellite layer unavailable', color: '#8FA083' }]);
        return;
      }
      const data = await res.json();
      const layer = L.tileLayer(data.tileUrlTemplate, { attribution: 'Google Earth Engine / Sentinel-2' });
      satelliteLayers[reserveKey] = layer;
      layer.addTo(map);
      setLegendPhase2(data.legend);
    } catch (err) {
      setLegendPhase2([{ label: 'Satellite layer failed to load', color: '#8FA083' }]);
    }
  }

  function switchPhase(phase) {
    currentPhase = phase;
    document.getElementById('phase1-btn').classList.toggle('active', phase === 1);
    document.getElementById('phase2-btn').classList.toggle('active', phase === 2);

    Object.values(satelliteLayers).forEach((l) => map.removeLayer(l));
    bufferLayers.forEach((l) => map.removeLayer(l));

    if (phase === 1) {
      bufferLayers.forEach((l) => l.addTo(map));
      setLegendPhase1();
    } else {
      loadSatelliteLayer('bandipur');
      loadSatelliteLayer('nagarahole');
    }
  }

  document.getElementById('phase1-btn').addEventListener('click', () => switchPhase(1));
  document.getElementById('phase2-btn').addEventListener('click', () => switchPhase(2));

  // ---- Villages ----
  async function loadVillages() {
    const res = await fetch('/api/villages');
    const data = await res.json();
    data.villages.forEach((v) => {
      const marker = L.marker([v.lat, v.lon], {
        icon: L.divIcon({ className: '', html: '<div class="village-marker"></div>', iconSize: [10, 10], iconAnchor: [5, 5] }),
      }).addTo(map);
      marker.bindPopup(`<b>${v.name}</b>`);
    });
  }

  // ---- Animal sightings / conflicts ----
  function renderConflictCard(c) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="row1">
        <span class="pill ${c.risk}">${c.risk === 'high' ? 'Farmland risk' : 'Approaching'}</span>
        <span class="mono" style="font-size:11px;color:var(--text-muted)">${c.distanceToEdgeKm.toFixed(1)}km</span>
      </div>
      <div class="mono" style="font-size:12px">${c.species !== 'unknown' ? c.species : 'Animal'} ${c.id}</div>
      <div class="meta">Near ${c.nearestReserve} · ${new Date(c.timestamp).toLocaleString()}</div>
    `;
    return card;
  }

  function renderFireCard(a) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="row1"><span class="pill fire">Thermal signal</span></div>
      <div class="mono" style="font-size:12px">${a.lat.toFixed(4)}, ${a.lon.toFixed(4)}</div>
      <div class="meta">${a.acquired} · confidence ${a.confidence}</div>
    `;
    return card;
  }

  async function refreshSightings() {
    const res = await fetch('/api/sightings');
    const data = await res.json();
    document.getElementById('tel-tracked').textContent = data.count;

    data.sightings.forEach((s) => {
      let marker = animalMarkers.get(s.id);
      const icon = L.divIcon({ className: '', html: `<div class="animal-marker ${s.risk}"></div>`, iconSize: [16, 16], iconAnchor: [8, 8] });
      if (!marker) {
        marker = L.marker([s.lat, s.lon], { icon }).addTo(map);
        animalMarkers.set(s.id, marker);
      } else {
        marker.setLatLng([s.lat, s.lon]);
        marker.setIcon(icon);
      }
      marker.bindPopup(`<b>${s.species}</b> ${s.id}<br/>Risk: ${s.risk}<br/>${s.distanceToEdgeKm.toFixed(1)}km from ${s.nearestReserve}`);
    });
  }

  async function refreshConflicts() {
    const res = await fetch('/api/conflicts');
    const data = await res.json();
    document.getElementById('tel-conflicts').textContent = data.count;

    const feedList = document.getElementById('feed-list');
    let added = false;
    data.conflicts.forEach((c) => {
      const key = `${c.id}_${c.timestamp}`;
      if (seenConflictIds.has(key)) return;
      seenConflictIds.add(key);
      added = true;
      if (feedList.querySelector('.empty-state')) feedList.innerHTML = '';
      feedList.prepend(renderConflictCard(c));
    });
  }

  async function refreshFires() {
    const res = await fetch('/api/fire-alerts');
    const data = await res.json();
    document.getElementById('tel-fires').textContent = data.count;

    const feedList = document.getElementById('feed-list');
    data.alerts.forEach((a) => {
      const key = `${a.lat}_${a.lon}_${a.acquired}`;
      if (seenFireKeys.has(key)) return;
      seenFireKeys.add(key);
      if (feedList.querySelector('.empty-state')) feedList.innerHTML = '';
      feedList.prepend(renderFireCard(a));
    });
  }

  // ---- Init ----
  setLegendPhase1();
  loadReserves();
  loadVillages();
  refreshSightings();
  refreshConflicts();
  refreshFires();
  setInterval(refreshSightings, 60 * 1000);
  setInterval(refreshConflicts, 60 * 1000);
  setInterval(refreshFires, 60 * 1000);
</script>

</body>
</html>
